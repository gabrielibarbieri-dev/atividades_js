<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soma JS</title>
</head>
<body>
    <script>

        alert('O programa execultará as Operações (+ - * /) entre os números digitados')
        var num1 = parseInt(prompt("Digite o primeiro número: "));
        var num2 = parseInt(prompt("Digite o outro número que deseja calcular: "));

        var resultadosoma = num1 + num2;
        document.write('o resultado da soma é: ', resultadosoma);
        document.write('<br>')
        var resultadosubtracao = num1 - num2;
        document.write('o resultado da subtração é: ', resultadosubtracao);
        document.write('<br>')
        var resultadodivisao = num1 / num2;
        document.write('o resultado da divisão é: ', resultadodivisao);
        document.write('<br>')
        var resultadomutiplicacao = num1 * num2;
        document.write('o resultado da mutiplicação é: ', resultadomutiplicacao)
        document.write('<br>')
        // num1 = parseInt(num1);
        // num2 = parseInt(num2);
    </script>
</body>
</html>
